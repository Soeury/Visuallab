
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>电池数据分析 - 交互仪表板</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            display: block;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .card h3 {
            margin: 0 0 10px 0;
            color: #667eea;
        }
        .card p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }
        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>锂电池数据分析仪表板</h1>
        <div class="subtitle">NASA锂电池老化数据集 - 交互式可视化</div>

        <div class="grid">
            <a href="capacity_interactive.html" class="card">
                <div class="icon"></div>
                <h3>容量衰减曲线</h3>
                <p>查看电池容量随循环次数的衰减趋势，鼠标悬停显示详细数据</p>
            </a>

            <a href="temperature_heatmap_interactive.html" class="card">
                <div class="icon"></div>
                <h3>温度热力图</h3>
                <p>放电过程中温度分布热图，观察温度演化规律</p>
            </a>

            <a href="vc_curves_interactive.html" class="card">
                <div class="icon"></div>
                <h3>电压-容量曲线</h3>
                <p>不同循环阶段的电压容量关系曲线</p>
            </a>

            <a href="multidimensional_scatter.html" class="card">
                <div class="icon"></div>
                <h3>多维度散点图</h3>
                <p>气泡图展示容量、温度、阻抗等多维数据</p>
            </a>

            <a href="dashboard.html" class="card">
                <div class="icon"></div>
                <h3>综合仪表板</h3>
                <p>多指标综合监控，一站式查看电池性能</p>
            </a>
        </div>

        <footer>
            <p>提示：鼠标悬停在图表上可查看详细数据 | 支持缩放、平移、图例筛选</p>
        </footer>
    </div>
</body>
</html>
